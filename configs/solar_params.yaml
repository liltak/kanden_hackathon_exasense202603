# Solar simulation parameters
location:
  latitude: 34.69   # Osaka (Kansai region)
  longitude: 135.50
  altitude: 10       # meters above sea level
  timezone: "Asia/Tokyo"

simulation:
  year: 2025
  time_resolution_minutes: 60    # 1-hour intervals = 8,760 points/year
  dni_model: "ineichen"          # Clear sky model: ineichen, haurwitz, simplified_solis
  include_diffuse: true          # Include DHI (diffuse horizontal irradiance)
  diffuse_model: "perez"         # Diffuse model: isotropic, perez (anisotropic)
  albedo: 0.15                   # Ground reflectance (factory/urban: 0.10-0.20)
  # epw_file: "data/weather/JPN_Osaka.epw"  # Uncomment to use real weather data

panel:
  efficiency: 0.20               # 20% panel efficiency
  degradation_rate: 0.005        # 0.5% annual degradation
  cost_per_kw: 250000            # JPY per kW installed
  lifespan_years: 25
  temp_coeff_pmax: -0.004        # Temperature coefficient of Pmax (%/°C, crystalline Si)
  mount_type: "open_rack_glass_polymer"  # SAPM mounting type

electricity:
  price_per_kwh: 30              # JPY per kWh (industrial rate)
  annual_price_increase: 0.02    # 2% annual increase

mesh:
  max_faces_for_simulation: 10000
  min_face_area_m2: 0.5          # Skip tiny faces
  preprocessing:
    voxel_size: 0.02             # Voxel downsample size (meters)
    stat_nb_neighbors: 20        # Statistical outlier: neighbor count
    stat_std_ratio: 2.0          # Statistical outlier: std ratio
    radius_nb_points: 16         # Radius outlier: min points in radius
    radius: 0.05                 # Radius outlier: search radius (meters)
  reconstruction:
    poisson_depth: 7             # Poisson octree depth (7 = balanced)
    density_quantile: 0.15       # Remove bottom 15% low-density vertices
    linear_fit: true             # Linear fit for boundary extrapolation
  postprocessing:
    smooth_iterations: 10        # Taubin smoothing iterations
    smooth_lambda: 0.5           # Smoothing positive factor
    smooth_mu: -0.53             # Smoothing negative factor (volume-preserving)
    target_faces: 20000          # Quadric decimation target
    min_component_ratio: 0.01    # Remove components < 1% of total faces
  plane_detection:
    max_planes: 10               # Max number of RANSAC planes to detect
    distance_threshold: 0.1      # Inlier distance threshold (meters)
    ransac_n: 3                  # Points per RANSAC sample
    num_iterations: 1000         # RANSAC iterations per plane
    min_plane_ratio: 0.02        # Min fraction of vertices for a plane
