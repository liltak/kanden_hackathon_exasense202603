# 金曜深夜（土曜 3:00 JST = 金曜 18:00 UTC）に会社リポの変更を個人リポに同期
name: Sync from Company

on:
  schedule:
    - cron: '0 18 * * 5'  # 毎週金曜 18:00 UTC = 土曜 3:00 JST
  workflow_dispatch:  # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Add company remote
        run: git remote add company https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/exwzd-aite/kanden_hackathon_exasense.git

      - name: Fetch company main
        run: git fetch company main

      - name: Merge company changes (fast-forward or merge commit)
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          if git merge company/main --no-edit; then
            echo "MERGE_OK=true" >> $GITHUB_ENV
          else
            echo "MERGE_OK=false" >> $GITHUB_ENV
            git merge --abort
            echo "::warning::Merge conflict detected. Skipping auto-sync."
          fi

      - name: Push if merged
        if: env.MERGE_OK == 'true'
        run: git push origin main
