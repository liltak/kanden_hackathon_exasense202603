apiVersion: v1
kind: Secret
metadata:
  name: {{ include "exasense.fullname" . }}-secrets
  namespace: {{ include "exasense.namespace" . }}
  labels:
    {{- include "exasense.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.api.env.JWT_SECRET | default "change-me-in-production" | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | default "change-me" | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.auth.accessKey | default "exasense" | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.auth.secretKey | default "change-me" | quote }}
