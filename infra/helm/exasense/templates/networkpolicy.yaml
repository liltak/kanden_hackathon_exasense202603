{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "exasense.fullname" . }}-default-deny
  namespace: {{ include "exasense.namespace" . }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow within namespace
    - to:
        - podSelector: {}
  ingress:
    # Allow within namespace
    - from:
        - podSelector: {}
---
# Allow ingress to API and Frontend from outside
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "exasense.fullname" . }}-allow-ingress
  namespace: {{ include "exasense.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "exasense.fullname" . }}-allow-frontend-ingress
  namespace: {{ include "exasense.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3000
{{- end }}
