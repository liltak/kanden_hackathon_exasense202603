{{- if .Values.workerSim.autoscaling.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "exasense.fullname" . }}-worker-sim
  namespace: {{ include "exasense.namespace" . }}
  labels:
    {{- include "exasense.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "exasense.fullname" . }}-worker-sim
  minReplicaCount: {{ .Values.workerSim.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.workerSim.autoscaling.maxReplicas }}
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    - type: redis
      metadata:
        address: {{ include "exasense.redisUrl" . }}
        listName: {{ .Values.workerSim.autoscaling.queueName }}
        listLength: {{ .Values.workerSim.autoscaling.queueThreshold | quote }}
{{- end }}
