# Production environment overrides

api:
  replicaCount: 3
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
  ingress:
    host: api.exasense.example.com
    tls: true

frontend:
  replicaCount: 2
  env:
    NEXT_PUBLIC_API_URL: https://api.exasense.example.com
  ingress:
    host: exasense.example.com
    tls: true

workerSim:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10

workerGpu:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 0
    maxReplicas: 2

redis:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  persistence:
    size: 10Gi

postgres:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    size: 100Gi

minio:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    size: 500Gi

networkPolicy:
  enabled: true

monitoring:
  enabled: true
