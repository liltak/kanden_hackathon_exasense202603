services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: exasense
      POSTGRES_USER: exasense
      POSTGRES_PASSWORD: exasense_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exasense"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: exasense
      MINIO_ROOT_PASSWORD: exasense_dev
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: >
      uvicorn src.api.server:app
      --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://exasense:exasense_dev@postgres:5432/exasense
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=exasense
      - MINIO_SECRET_KEY=exasense_dev
      - MINIO_SECURE=false
      - JWT_SECRET=dev-secret-change-in-production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../configs:/app/configs
      - ../data:/app/data
    restart: unless-stopped

  worker-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker-sim
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://exasense:exasense_dev@postgres:5432/exasense
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=exasense
      - MINIO_SECRET_KEY=exasense_dev
      - MINIO_SECURE=false
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../configs:/app/configs
      - ../data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
